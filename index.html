<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF MASTER | Jump Your FICO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body class="wiz-theme">
    <div class="scanlines"></div>
    
    <nav class="glass-nav">
        <div class="logo">
            <span class="neon-purple">PDF MASTER</span>
            <span class="tag">INTERNAL TOOL</span>
        </div>
        <div class="status-pill"><span class="pulse"></span> SYSTEM READY</div>
    </nav>

    <main class="container">
        <section class="upload-zone" id="drop-zone">
            <input type="file" id="file-input" multiple accept=".pdf" hidden>
            <input type="file" id="photo-input" multiple accept="image/*" hidden>
            <div class="upload-content">
                <div class="icon">📂</div>
                <h2>Drop PDFs or Photos here</h2>
                <p>Upload multiple files to merge, reorder, or edit.</p>
                <div class="upload-actions">
                    <button class="btn-primary" onclick="document.getElementById('file-input').click()">SELECT FILES</button>
                    <button class="btn-action" onclick="document.getElementById('photo-input').click()">SELECT PHOTOS</button>
                </div>
            </div>
        </section>

        <section id="editor-ui" class="hidden">
            <div class="toolbar">
                <button type="button" class="btn-action" onclick="generateFinalPreview()">PREVIEW FINAL DOCUMENT</button>
                <button type="button" class="btn-action" onclick="mergeAll()">MERGE & DOWNLOAD</button>
                <button type="button" class="btn-primary" onclick="document.getElementById('file-input').click()">ADD MORE FILES</button>
                <button type="button" class="btn-action" onclick="document.getElementById('photo-input').click()">ADD MORE PHOTOS</button>
                <div class="tool-group">
                    <input type="text" id="overlay-text" placeholder="Text to add...">
                    <button class="btn-primary" onclick="addTextOverlay()">ADD TEXT TO ALL PAGES</button>
                </div>
                <button class="btn-danger" onclick="resetEditor()">CLEAR ALL</button>
            </div>
            
            <div id="file-list" class="file-grid">
                <!-- Files will appear here -->
            </div>
        </section>

        <!-- Preview Modal -->
        <div id="preview-modal" class="modal hidden">
            <div class="modal-card preview-card">
                <div class="modal-header">
                    <h3 id="preview-title">File Preview</h3>
                    <span class="close-modal" onclick="closePreview()">×</span>
                </div>
                <div id="preview-body" class="preview-body">
                    <!-- Image or PDF preview will load here -->
                </div>
                <div class="modal-actions">
                    <button id="edit-button" class="btn-action hidden" onclick="startEditing()">EDIT IMAGE</button>
                    <button class="btn-danger" onclick="closePreview()">CLOSE</button>
                </div>
            </div>
        </div>

        <!-- Editor Modal -->
        <div id="editor-modal" class="modal hidden">
            <div class="modal-card">
                <div class="modal-header">
                    <h3>Edit Image</h3>
                    <span class="close-modal" onclick="cancelEditing()">×</span>
                </div>
                <div class="editor-container">
                    <img id="editing-image" src="" alt="Editing">
                </div>
                <div class="editor-toolbar">
                    <button class="btn-order" onclick="cropper.rotate(-90)">↺ ROTATE</button>
                    <button class="btn-order" onclick="cropper.rotate(90)">↻ ROTATE</button>
                    <button class="btn-order" onclick="cropper.setDragMode('crop')">CROP MODE</button>
                    <button class="btn-order" onclick="cropper.setDragMode('move')">MOVE MODE</button>
                </div>
                <div class="modal-actions">
                    <button class="btn-primary" onclick="saveEdit()">SAVE CHANGES</button>
                    <button class="btn-danger" onclick="cancelEditing()">CANCEL</button>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
